# voice-to-mermaid backend — non-sensitive app config
# Volume-mounted in Docker; edit here without rebuilding.
#
# Secrets (OLLAMA_URL, OPENAI_API_KEY, etc.) stay in .env / Infisical.

ollama:
  default_model: "qwen3:8b"
  # Models shown in the UI picker — exact names or prefixes (e.g. "qwen2.5:").
  # Leave empty to show all installed models.
  model_filter:
    - "qwen2.5:14b"
    - "qwen3.5:27b"
    - "qwen3:8b"
    - "qwen3:14b"
    - "llama3.2:3b"

openai:
  model: "gpt-4o-mini"

whisper:
  # true = attempt to load WhisperLiveKit at startup.
  # If import fails (deps not installed), _stt_available stays False and
  # /v1/config returns stt_enabled: false — no crash.
  # Install requirements.stt.txt (or add it to Dockerfile) before setting true.
  enabled: true
  model: "medium.en"
  language: "en"
  device: "auto"   # "auto", "cuda", "cpu" — maps to WhisperLiveKitConfig backend

paths:
  prompt: "prompts/mermaid.txt"
  log_dir: "data/logs"
