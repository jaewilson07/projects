services:
  ollama:
    image: ollama/ollama:latest
    container_name: vtm-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # GPU support — remove 'deploy' block if no GPU available
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  api:
    build: .
    container_name: vtm-api
    restart: unless-stopped
    ports:
      - "${PORT:-7625}:7625"
    env_file: .env
    # OLLAMA_URL comes from .env — default uses bundled vtm-ollama; set to
    # http://host.docker.internal:11434 to use a host Ollama instead.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prompts:/app/prompts       # mount prompts so edits don't need rebuild
      - ./config.yaml:/app/config.yaml  # mount config so edits don't need rebuild

volumes:
  ollama-data:
